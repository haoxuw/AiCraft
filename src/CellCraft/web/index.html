<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CellCraft — Web</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1d22;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        color: #e8e8e8;
      }
      #app {
        position: absolute;
        inset: 0;
      }
      #canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: absolute;
        top: 12px;
        left: 12px;
        padding: 10px 14px;
        background: rgba(24, 28, 34, 0.55);
        border: 1px solid rgba(34, 211, 238, 0.3);
        border-radius: 10px;
        backdrop-filter: blur(6px);
        font-size: 13px;
        letter-spacing: 0.3px;
        pointer-events: none;
      }
      #hud b {
        color: #22d3ee;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
      <div id="hud">
        <div><b>CellCraft</b> — web scaffold</div>
        <div>WASD / arrows to move · click to steer · R to restart</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
